  <line x1="392" y1="450" x2="480" y2="508" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="612" y1="450" x2="555" y2="508" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="832" y1="450" x2="600" y2="508" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

