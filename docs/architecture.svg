<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="820" fill="#0d1117"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e6edf3">AutoSOC: Autonomous Security Operations Center</text>
  <text x="550" y="65" text-anchor="middle" font-size="13" fill="#7d8590">Multi-Agent Security Investigation System on GCP with Google ADK and Gemini</text>

  <!-- ─── TRIGGER ZONE ──────────────────────────────────────── -->
  <rect x="30" y="90" width="200" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="130" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#79c0ff">Security Command Center</text>
  <text x="130" y="134" text-anchor="middle" font-size="11" fill="#7d8590">SCC Finding Trigger</text>

  <rect x="270" y="90" width="200" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="370" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#79c0ff">Pub/Sub</text>
  <text x="370" y="134" text-anchor="middle" font-size="11" fill="#7d8590">scc-findings-raw</text>

  <!-- Arrow trigger to pubsub -->
  <line x1="230" y1="120" x2="268" y2="120" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── ADK WEB UI ────────────────────────────────────────── -->
  <rect x="660" y="90" width="200" height="60" rx="8" fill="#1a2332" stroke="#388bfd" stroke-width="2"/>
  <text x="760" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#388bfd">ADK Web UI</text>
  <text x="760" y="128" text-anchor="middle" font-size="11" fill="#7d8590">localhost:8000/dev-ui</text>
  <text x="760" y="143" text-anchor="middle" font-size="10" fill="#3fb950">Chat  |  Trace  |  State  |  Eval</text>

  <!-- ─── DETECTION AGENT ───────────────────────────────────── -->
  <rect x="270" y="210" width="200" height="80" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="370" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#3fb950">Detection Agent</text>
  <text x="370" y="254" text-anchor="middle" font-size="10" fill="#7d8590">Classifies SCC findings</text>
  <text x="370" y="270" text-anchor="middle" font-size="10" fill="#7d8590">Generates investigation_id</text>
  <text x="370" y="284" text-anchor="middle" font-size="10" fill="#7d8590">Emits Alert to pipeline</text>

  <!-- Arrow pubsub to detection -->
  <line x1="370" y1="150" x2="370" y2="208" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── ORCHESTRATOR AGENT ────────────────────────────────── -->
  <rect x="450" y="210" width="200" height="80" rx="8" fill="#1a2332" stroke="#388bfd" stroke-width="2"/>
  <text x="550" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#388bfd">Orchestrator Agent</text>
  <text x="550" y="254" text-anchor="middle" font-size="10" fill="#7d8590">Routes investigation state</text>
  <text x="550" y="270" text-anchor="middle" font-size="10" fill="#7d8590">Delegates to sub-agents</text>
  <text x="550" y="284" text-anchor="middle" font-size="10" fill="#7d8590">Persists to Firestore</text>

  <!-- Arrow detection to orchestrator -->
  <line x1="470" y1="250" x2="448" y2="250" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ADK UI to orchestrator -->
  <line x1="760" y1="150" x2="760" y2="190" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="760" y1="190" x2="652" y2="190" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="652" y1="190" x2="652" y2="210" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>

  <!-- ─── TRIAGE AGENT ───────────────────────────────────────── -->
  <rect x="80" y="360" width="185" height="90" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="172" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#d2a8ff">Triage Agent</text>
  <text x="172" y="403" text-anchor="middle" font-size="10" fill="#7d8590">IAM role enrichment</text>
  <text x="172" y="418" text-anchor="middle" font-size="10" fill="#7d8590">Severity scoring 1-10</text>
  <text x="172" y="433" text-anchor="middle" font-size="10" fill="#7d8590">Cloud Asset Inventory</text>
  <text x="172" y="445" text-anchor="middle" font-size="10" fill="#ffa657">score 7+ routes to threat_intel</text>

  <!-- ─── THREAT INTEL AGENT ────────────────────────────────── -->
  <rect x="300" y="360" width="185" height="90" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="392" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#d2a8ff">Threat Intel Agent</text>
  <text x="392" y="403" text-anchor="middle" font-size="10" fill="#7d8590">MITRE ATT&amp;CK mapping</text>
  <text x="392" y="418" text-anchor="middle" font-size="10" fill="#7d8590">T1530 / T1078 / T1110</text>
  <text x="392" y="433" text-anchor="middle" font-size="10" fill="#7d8590">Threat confidence score</text>
  <text x="392" y="448" text-anchor="middle" font-size="10" fill="#7d8590">VirusTotal / IOC lookup</text>

  <!-- ─── FORENSICS AGENT ───────────────────────────────────── -->
  <rect x="520" y="360" width="185" height="90" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="612" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#d2a8ff">Forensics Agent</text>
  <text x="612" y="403" text-anchor="middle" font-size="10" fill="#7d8590">Cloud Logging audit pull</text>
  <text x="612" y="418" text-anchor="middle" font-size="10" fill="#7d8590">24hr event timeline</text>
  <text x="612" y="433" text-anchor="middle" font-size="10" fill="#7d8590">Blast radius analysis</text>
  <text x="612" y="448" text-anchor="middle" font-size="10" fill="#7d8590">Evidence to GCS bucket</text>

