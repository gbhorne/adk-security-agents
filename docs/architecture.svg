  <text x="515" y="568" text-anchor="middle" font-size="10" fill="#7d8590">BigQuery findings write</text>
  <text x="515" y="583" text-anchor="middle" font-size="10" fill="#7d8590">Firestore RESOLVED status</text>
  <text x="515" y="597" text-anchor="middle" font-size="10" fill="#7d8590">CISO-ready incident summary</text>

