  <text x="832" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#ff7b72">Remediation Agent</text>
  <text x="832" y="403" text-anchor="middle" font-size="10" fill="#7d8590">Score &lt;= 6: auto-execute</text>
  <text x="832" y="418" text-anchor="middle" font-size="10" fill="#7d8590">Score &gt; 6: human approval</text>
  <text x="832" y="433" text-anchor="middle" font-size="10" fill="#7d8590">Slack webhook notification</text>
  <text x="832" y="448" text-anchor="middle" font-size="10" fill="#ffa657">GCS / IAM enforcement</text>

  <!-- ─── REPORTING AGENT ────────────────────────────────────── -->
  <rect x="415" y="510" width="200" height="90" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="515" y="535" text-anchor="middle" font-size="12" font-weight="700" fill="#3fb950">Reporting Agent</text>
