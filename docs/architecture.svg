  <line x1="500" y1="290" x2="240" y2="360" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="520" y1="290" x2="392" y2="358" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="550" y1="290" x2="580" y2="358" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="580" y1="290" x2="780" y2="358" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

