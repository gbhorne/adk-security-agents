  <rect x="215" y="645" width="155" height="70" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="292" y="668" text-anchor="middle" font-size="12" font-weight="700" fill="#ffa657">BigQuery</text>
  <text x="292" y="685" text-anchor="middle" font-size="10" fill="#7d8590">findings / baselines</text>
  <text x="292" y="700" text-anchor="middle" font-size="10" fill="#7d8590">timelines / audit history</text>

  <rect x="400" y="645" width="155" height="70" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="477" y="668" text-anchor="middle" font-size="12" font-weight="700" fill="#ffa657">Pub/Sub</text>
  <text x="477" y="685" text-anchor="middle" font-size="10" fill="#7d8590">4 topics / 4 subscriptions</text>
  <text x="477" y="700" text-anchor="middle" font-size="10" fill="#7d8590">Agent message bus</text>

  <rect x="585" y="645" width="155" height="70" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="662" y="668" text-anchor="middle" font-size="12" font-weight="700" fill="#ffa657">Cloud Storage</text>
  <text x="662" y="685" text-anchor="middle" font-size="10" fill="#7d8590">autosoc-sec-evidence</text>
  <text x="662" y="700" text-anchor="middle" font-size="10" fill="#7d8590">Forensic evidence store</text>

  <rect x="770" y="645" width="155" height="70" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="847" y="668" text-anchor="middle" font-size="12" font-weight="700" fill="#ffa657">Vertex AI</text>
  <text x="847" y="685" text-anchor="middle" font-size="10" fill="#7d8590">Gemini 2.0 Flash</text>
  <text x="847" y="700" text-anchor="middle" font-size="10" fill="#7d8590">NL summary generation</text>

  <!-- Reporting to data layer arrows -->
  <line x1="460" y1="600" x2="107" y2="643" stroke="#ffa657" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <line x1="490" y1="600" x2="292" y2="643" stroke="#ffa657" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <line x1="515" y1="600" x2="477" y2="643" stroke="#ffa657" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <line x1="555" y1="600" x2="620" y2="643" stroke="#ffa657" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <line x1="580" y1="600" x2="820" y2="643" stroke="#ffa657" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- ─── SERVICE ACCOUNT ────────────────────────────────────── -->
  <rect x="940" y="210" width="140" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
