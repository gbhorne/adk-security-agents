  <text x="1010" y="248" text-anchor="middle" font-size="9" fill="#7d8590">autosoc-sa@</text>
  <text x="1010" y="262" text-anchor="middle" font-size="9" fill="#7d8590">sec-autosoc.iam</text>
  <line x1="950" y1="275" x2="1070" y2="275" stroke="#30363d" stroke-width="1"/>
  <text x="1010" y="292" text-anchor="middle" font-size="9" fill="#7d8590">bigquery.dataEditor</text>
  <text x="1010" y="307" text-anchor="middle" font-size="9" fill="#7d8590">pubsub.editor</text>
  <text x="1010" y="320" text-anchor="middle" font-size="9" fill="#7d8590">aiplatform.user</text>

  <!-- ─── INVESTIGATION TIMING ──────────────────────────────── -->
  <rect x="940" y="360" width="140" height="95" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="1010" y="382" text-anchor="middle" font-size="11" font-weight="700" fill="#e6edf3">Performance</text>
  <line x1="950" y1="390" x2="1070" y2="390" stroke="#30363d" stroke-width="1"/>
  <text x="1010" y="407" text-anchor="middle" font-size="10" fill="#3fb950">PUBLIC_BUCKET</text>
  <text x="1010" y="421" text-anchor="middle" font-size="10" fill="#7d8590">28.4 sec / 6 agents</text>
  <text x="1010" y="438" text-anchor="middle" font-size="10" fill="#ff7b72">PRIVILEGE_ESCALATION</text>
  <text x="1010" y="452" text-anchor="middle" font-size="10" fill="#7d8590">43.0 sec / 6 agents</text>

  <!-- ─── LEGEND ─────────────────────────────────────────────── -->
  <rect x="940" y="490" width="140" height="165" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="1010" y="512" text-anchor="middle" font-size="11" font-weight="700" fill="#e6edf3">Legend</text>
  <line x1="950" y1="520" x2="1070" y2="520" stroke="#30363d" stroke-width="1"/>
  <rect x="955" y="530" width="12" height="12" rx="2" fill="none" stroke="#388bfd" stroke-width="2"/>
  <text x="975" y="541" font-size="10" fill="#7d8590">ADK Orchestrator</text>
  <rect x="955" y="550" width="12" height="12" rx="2" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="975" y="561" font-size="10" fill="#7d8590">Detection / Reporting</text>
  <rect x="955" y="570" width="12" height="12" rx="2" fill="none" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="975" y="581" font-size="10" fill="#7d8590">Investigation agents</text>
  <rect x="955" y="590" width="12" height="12" rx="2" fill="none" stroke="#ff7b72" stroke-width="1.5"/>
  <text x="975" y="601" font-size="10" fill="#7d8590">Remediation agent</text>
  <rect x="955" y="610" width="12" height="12" rx="2" fill="none" stroke="#ffa657" stroke-width="1.5"/>
  <text x="975" y="621" font-size="10" fill="#7d8590">Data layer (GCP)</text>
  <line x1="955" y1="636" x2="967" y2="636" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3"/>
