  <line x1="955" y1="650" x2="967" y2="650" stroke="#388bfd" stroke-width="1.5"/>
  <text x="975" y="654" font-size="10" fill="#7d8590">Direct call</text>

  <!-- ─── ARROW MARKERS ─────────────────────────────────────── -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388bfd"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffa657"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="550" y="800" text-anchor="middle" font-size="11" fill="#484f58">
    Project: sec-autosoc | Region: us-central1 | Framework: Google ADK 1.26 | Model: Gemini 2.5 Flash
  </text>

